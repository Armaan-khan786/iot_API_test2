name: IoT Hardware CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  hardware-test:
    runs-on: self-hosted

    env:
      BLYNK_TOKEN: ${{ secrets.BLYNK_TOKEN }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Verify Python
      run: python --version

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Robot Tests
      run: robot test_device.robot

    - name: Upload Robot Reports
      uses: actions/upload-artifact@v4
      with:
        name: Robot-Reports
        path: |
          output.xml
          log.html
          report.html
